<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect: encode the path and send to index.html
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1).join("/") +
          "/?p=" +
          encodeURIComponent(l.pathname.slice(1) + (l.search ? "&" + l.search.slice(1) : "")) +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
