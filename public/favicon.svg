<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110">
  <defs>
    <linearGradient id="g1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Document fill -->
  <path d="M8,4 L60,4 L76,20 L76,88 Q76,93 71,93 L13,93 Q8,93 8,88 Z" fill="#0d1117"/>
  <!-- Document border neon -->
  <path d="M8,4 L60,4 L76,20 L76,88 Q76,93 71,93 L13,93 Q8,93 8,88 Z" fill="none" stroke="url(#g1)" stroke-width="3" filter="url(#glow)"/>

  <!-- Dog-ear fold -->
  <path d="M60,4 L60,20 L76,20 Z" fill="#1a2035"/>
  <path d="M60,4 L60,20 L76,20" fill="none" stroke="url(#g1)" stroke-width="2" filter="url(#glow)"/>

  <!-- Person head -->
  <circle cx="42" cy="26" r="9" fill="url(#g1)" filter="url(#glow)"/>
  <!-- Person body/shoulders -->
  <path d="M23,47 C23,36 61,36 61,47" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Text lines -->
  <line x1="18" y1="56" x2="66" y2="56" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="18" y1="66" x2="66" y2="66" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="18" y1="76" x2="52" y2="76" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Badge circle fill -->
  <circle cx="70" cy="82" r="18" fill="#0d1117"/>
  <!-- Badge circle neon border -->
  <circle cx="70" cy="82" r="18" fill="none" stroke="url(#g1)" stroke-width="3" filter="url(#glow)"/>
  <!-- Checkmark -->
  <polyline points="61,82 68,90 80,71" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
